version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: terminal_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
      - ./backups:/backups
    networks:
      - terminal_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: terminal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - terminal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Monitoring Service
  monitor-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terminal_monitor
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - terminal_network

  # Flask API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: terminal_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    networks:
      - terminal_network

  # React Dashboard
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL}
    container_name: terminal_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - terminal_network

volumes:
  mysql_data:
    driver: local

networks:
  terminal_network:
    driver: bridge
